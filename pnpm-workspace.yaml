# pnpm 11 requires explicit approval to run a dependency's install/build
# scripts; without it a fresh `pnpm install --frozen-lockfile` aborts with
# ERR_PNPM_IGNORED_BUILDS. Approve the toolchain/native deps that need to build.
allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
  '@heartexlabs/label-studio': true
  onnxruntime-node: true
